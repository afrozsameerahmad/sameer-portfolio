<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0f"/>

  <!-- Neural network connections -->
  <line x1="7" y1="10" x2="16" y2="16" stroke="#00ffd5" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="7" y1="22" x2="16" y2="16" stroke="#00ffd5" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="16" y1="7"  x2="16" y2="16" stroke="#00ffd5" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="25" y2="10" stroke="#00ffd5" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="25" y2="22" stroke="#00ffd5" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="16" y2="25" stroke="#00ffd5" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Outer nodes -->
  <circle cx="7"  cy="10" r="2.5" fill="#00ffd5" fill-opacity="0.7"/>
  <circle cx="7"  cy="22" r="2.5" fill="#00ffd5" fill-opacity="0.7"/>
  <circle cx="16" cy="7"  r="2.5" fill="#38bdf8" fill-opacity="0.7"/>
  <circle cx="25" cy="10" r="2.5" fill="#00ffd5" fill-opacity="0.7"/>
  <circle cx="25" cy="22" r="2.5" fill="#00ffd5" fill-opacity="0.7"/>
  <circle cx="16" cy="25" r="2.5" fill="#38bdf8" fill-opacity="0.7"/>

  <!-- Center node (glowing) -->
  <circle cx="16" cy="16" r="4.5" fill="#00ffd5" fill-opacity="0.15"/>
  <circle cx="16" cy="16" r="3"   fill="#00ffd5"/>
</svg>
